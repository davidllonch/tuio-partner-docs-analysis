server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — applied to every response
    # X-Frame-Options: prevents the page from being embedded in an <iframe>
    #   (protects against clickjacking attacks)
    add_header X-Frame-Options "DENY" always;
    # X-Content-Type-Options: tells browsers to trust the declared Content-Type
    #   (prevents MIME-sniffing attacks)
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy: controls how much URL info is sent to other sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy: restricts what resources the page can load
    #   (first line of defence against cross-site scripting)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:;" always;
    # Permissions-Policy: disables browser features not used by this app
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # React Router: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers so they are not dropped by the location block
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
